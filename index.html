function getPeriod(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDate(), month = d.getMonth(), year = d.getFullYear();
  let sm = day >= 23 ? month : month - 1;
  let sy = year;
  if (sm < 0) { sm = 11; sy = year - 1; }
  const em = (sm + 1) % 12;
  const ey = sm === 11 ? sy + 1 : sy;
  return { key: sy + "-" + String(sm).padStart(2,"0"), label: "23 " + MN[sm] + " – 22 " + MN[em] + " " + ey };
}

    if (typeof val === "string") return { stringValue: val };
    if (typeof val === "number") return { doubleValue: val };
    if (typeof val === "boolean") return { booleanValue: val };
    if (val === null) return { nullValue: null };
    if (Array.isArray(val)) return { arrayValue: { values: val.map(fsToValue) } };
    if (typeof val === "object") return { mapValue: { fields: Object.fromEntries(Object.entries(val).map(([k,v])=>[k,fsToValue(v)])) } };
    return { stringValue: String(val) };
  };

  const fsFromValue = (val) => {
    if (val.stringValue !== undefined) return val.stringValue;
    if (val.doubleValue !== undefined) return val.doubleValue;

    if (val.booleanValue !== undefined) return val.booleanValue;
    if (val.nullValue !== undefined) return null;
    if (val.arrayValue) return (val.arrayValue.values || []).map(fsFromValue);

    }
  });
  const costPeriods = Object.entries(costPeriodMap).filter(([key,p])=>p.hasData && !HISTORICAL_PERIODS[key]).sort((a,b)=>a[0].localeCompare(b[0]));

  // ── Merged riepilogo: historical data takes priority for costs, but manual/CSV trips add km even in historical periods ──
  const mergedPeriods = {};
  Object.entries(HISTORICAL_PERIODS).forEach(([key, p]) => {
    mergedPeriods[key] = { ...p };
  });
  trips.forEach(trip => {
    const { key, label } = getPeriod(trip.date);
    const km = Number(trip.km) || 0;
    const l100 = Number(trip.consumption) || yariAvg;
    const price = lastPrice;
    if (HISTORICAL_PERIODS[key]) {
      // Periodo storico: aggiunge km solo per trip manuali/CSV (non Excel, già inclusi nell'aggregato)
      if (trip.source !== "excel") {
        mergedPeriods[key].km += km;
        if (l100 && price) {
          mergedPeriods[key].yariCost += (l100/100)*km*price;
          mergedPeriods[key].oldCost += (OLD_L100/100)*km*price;
        }
      }
    } else {
      // Periodo nuovo: aggiunge tutto
      if (!mergedPeriods[key]) mergedPeriods[key] = { label, km: 0, yariCost: 0, oldCost: 0, isNew: true };
      mergedPeriods[key].km += km;
      if (l100 && price) {
        mergedPeriods[key].yariCost += (l100/100)*km*price;
        mergedPeriods[key].oldCost += (OLD_L100/100)*km*price;
      }
    }
  });
  const mergedList = Object.entries(mergedPeriods).sort((a,b)=>b[0].localeCompare(a[0]));
  const grandTotalYari = mergedList.reduce((s,[,p])=>s+p.yariCost,0);
  const grandTotalOld = mergedList.reduce((s,[,p])=>s+p.oldCost,0);
  const grandTotalKm = mergedList.reduce((s,[,p])=>s+p.km,0);
  const grandSaving = grandTotalOld - grandTotalYari;

  // ── styles ──
  const inp = { width:"100%", background:"#111", border:"1px solid #2e2e2e", borderRadius:12, padding:"12px 14px", color:"#fff", fontSize:15, fontFamily:"inherit", boxSizing:"border-box", outline:"none" };
  const card = { background:"#161616", border:"1px solid #222", borderRadius:18, padding:"16px 18px" };
  const pill = (active) => ({ background:active?"#e8f01a":"#1a1a1a", color:active?"#111":"#777", border:active?"none":"1px solid #2a2a2a", borderRadius:20, padding:"8px 16px", fontWeight:active?700:400, fontSize:13, cursor:"pointer", fontFamily:"inherit", whiteSpace:"nowrap", transition:"all 0.2s" });

  return (
    <div style={{ minHeight:"100vh", background:"#0f0f0f", fontFamily:"'DM Sans', sans-serif", color:"#f0ede8" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

      {/* HEADER */}
      <div style={{ background:"#111", borderBottom:"1px solid #1e1e1e", padding:"20px 16px 0", position:"sticky", top:0, zIndex:20 }}>
        <div style={{ maxWidth:640, margin:"0 auto" }}>
          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>
            <div style={{ width:40, height:40, borderRadius:12, background:"#e8f01a", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20 }}>🚗</div>
            <div>
              <div style={{ fontFamily:"'Syne', sans-serif", fontWeight:800, fontSize:18, color:"#fff" }}>Yaris Cross</div>
              <div style={{ fontSize:11, color:"#666", marginTop:-2 }}>Registro di bordo</div>
            </div>
            <div style={{ marginLeft:"auto", display:"flex", gap:8 }}>
              <button onClick={()=>fileRef.current.click()} style={{...pill(false), fontSize:12, padding:"8px 12px"}}>📥 CSV</button>
              <input ref={fileRef} type="file" accept=".csv,.txt" style={{display:"none"}} onChange={handleCSV} />
              {tab===2 && <button onClick={()=>{setFuelForm({date:"",odometer:"",liters:"",pricePerLiter:"",totalAmount:"",notes:""});setEditFuelId(null);setShowFuelForm(true);}} style={{background:"#e8f01a",color:"#111",border:"none",borderRadius:20,padding:"8px 16px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>+ Pieno</button>}
              {tab===0 && <button onClick={()=>{setTripForm({date:"",km:"",consumption:""});setEditTripId(null);setShowTripForm(true);}} style={{background:"#e8f01a",color:"#111",border:"none",borderRadius:20,padding:"8px 16px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>+ Percorso</button>}
            </div>
          </div>
          <div style={{ display:"flex", gap:6, overflowX:"auto", paddingBottom:1 }}>
            {TABS.map((t,i)=><button key={i} onClick={()=>setTab(i)} style={pill(tab===i)}>{t}</button>)}
          </div>
        </div>
      </div>

      {importMsg && <div style={{ background:importMsg.startsWith("✅")?"#1a2e1a":"#2e1a1a", border:`1px solid ${importMsg.startsWith("✅")?"#4ade80":"#f97316"}`, borderRadius:12, margin:"12px 16px 0", padding:"12px 16px", fontSize:13, maxWidth:640, marginLeft:"auto", marginRight:"auto" }}>{importMsg}</div>}

      <div style={{ maxWidth:640, margin:"0 auto", padding:"16px 16px 80px" }}>

        {/* FUEL FORM */}
        {showFuelForm && (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&(setShowFuelForm(false),setEditFuelId(null))}>
            <div style={{background:"#1a1a1a",borderRadius:"24px 24px 0 0",padding:"28px 24px 40px",width:"100%",maxWidth:640,border:"1px solid #2a2a2a"}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:17,marginBottom:20,color:"#fff"}}>{editFuelId?"✏️ Modifica rifornimento":"⛽ Nuovo rifornimento"}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                {[
                  {label:"Data *",col:2,el:<input type="date" value={fuelForm.date} onChange={e=>setFuelForm(f=>({...f,date:e.target.value}))} style={inp}/>},
                  {label:"Km odometro *",col:2,el:<input type="number" placeholder="es. 15340" value={fuelForm.odometer} onChange={e=>setFuelForm(f=>({...f,odometer:e.target.value}))} style={inp}/>},
                  {label:"Importo pagato (€) *",el:<input type="number" placeholder="es. 60.00" step="any" value={fuelForm.totalAmount} onChange={e=>setFuelForm(f=>({...f,totalAmount:e.target.value}))} style={inp}/>},
                  {label:"€ / litro *",el:<input type="number" placeholder="es. 1.789" step="any" value={fuelForm.pricePerLiter} onChange={e=>setFuelForm(f=>({...f,pricePerLiter:e.target.value}))} style={inp}/>},
                ].map(({label,col,el})=>(
                  <div key={label} style={{gridColumn:col===2?"span 2":"span 1"}}>
                    <label style={{fontSize:11,color:"#777",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:0.8}}>{label}</label>
                    {el}
                  </div>
                ))}
                <div style={{gridColumn:"span 2"}}>
                  <label style={{fontSize:11,color:"#777",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:0.8}}>Litri inseriti</label>
                  {fuelForm.totalAmount && fuelForm.pricePerLiter && Number(fuelForm.pricePerLiter)>0
                    ? <div style={{background:"#0f1a0f",border:"1px solid #2a4a2a",borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:22}}>🫙</span>
                        <span style={{fontSize:20,fontWeight:800,color:"#4ade80",fontFamily:"'Syne',sans-serif"}}>{(Number(fuelForm.totalAmount)/Number(fuelForm.pricePerLiter)).toFixed(2)} L</span>
                        <span style={{fontSize:12,color:"#555",marginLeft:4}}>calcolati automaticamente</span>
                      </div>
                    : <div style={{background:"#111",border:"1px solid #2a2a2a",borderRadius:12,padding:"12px 14px",fontSize:13,color:"#444"}}>Inserisci importo e prezzo al litro per calcolare</div>
                  }
                </div>
                <div style={{gridColumn:"span 2"}}>
                  <label style={{fontSize:11,color:"#777",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:0.8}}>Note</label>
                  <input type="text" placeholder="opzionale" value={fuelForm.notes} onChange={e=>setFuelForm(f=>({...f,notes:e.target.value}))} style={inp}/>
                </div>
              </div>
              <div style={{display:"flex",gap:10,marginTop:20}}>
                <button onClick={()=>{setShowFuelForm(false);setEditFuelId(null);}} style={{flex:1,background:"#222",border:"1px solid #333",borderRadius:14,padding:14,color:"#aaa",fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>Annulla</button>
                <button onClick={saveFuel} style={{flex:2,background:"#e8f01a",border:"none",borderRadius:14,padding:14,color:"#111",fontSize:14,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>{editFuelId?"Salva":"Aggiungi"}</button>
              </div>
            </div>
          </div>
        )}

        {/* TRIP FORM */}
        {showTripForm && (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&(setShowTripForm(false),setEditTripId(null))}>
            <div style={{background:"#1a1a1a",borderRadius:"24px 24px 0 0",padding:"28px 24px 40px",width:"100%",maxWidth:640,border:"1px solid #2a2a2a"}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:17,marginBottom:24,color:"#fff"}}>{editTripId?"✏️ Modifica percorso":"🗺️ Nuovo percorso"}</div>
              <div style={{display:"flex",flexDirection:"column",gap:16}}>
                <div>
                  <label style={{fontSize:11,color:"#777",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:0.8}}>Data *</label>
                  <input type="date" value={tripForm.date} onChange={e=>setTripForm(f=>({...f,date:e.target.value}))} style={inp}/>
                </div>
                <div>
                  <label style={{fontSize:11,color:"#777",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:0.8}}>Km percorsi *</label>
                  <input type="number" placeholder="es. 220" value={tripForm.km} onChange={e=>setTripForm(f=>({...f,km:e.target.value}))} style={inp}/>
                </div>
                <div>
                  <label style={{fontSize:11,color:"#777",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:0.8}}>Consumo medio (L/100km)</label>
                  <input type="number" placeholder={yariAvg?`es. ${yariAvg.toFixed(1)} (tua media attuale)`:"es. 5.2"} step="any" value={tripForm.consumption} onChange={e=>setTripForm(f=>({...f,consumption:e.target.value}))} style={inp}/>
                  {yariAvg
                    ? <div style={{fontSize:11,color:"#555",marginTop:7}}>💡 Lascia vuoto per usare la tua media reale: <span style={{color:fuelColor(yariAvg),fontWeight:700}}>{yariAvg.toFixed(2)} L/100km</span></div>
                    : <div style={{fontSize:11,color:"#555",marginTop:7}}>💡 Aggiungi almeno 2 pieni per calcolare la media automaticamente</div>
                  }
                  {(()=>{
                    const l100 = Number(tripForm.consumption) || bestAvg;
                    if (!l100) return null;
                    const kmL = 100 / l100;
                    const color = kmL >= 35 ? "#4ade80" : kmL >= 28 ? "#e8f01a" : "#f97316";
                    return (
                      <div style={{marginTop:10,background:"#111",border:`1px solid ${color}33`,borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:18}}>⚡</span>
                        <div>
                          <div style={{fontSize:10,color:"#666",textTransform:"uppercase",letterSpacing:0.8,marginBottom:2}}>Consumo equivalente</div>
                          <div style={{fontSize:18,fontWeight:800,color,fontFamily:"'Syne',sans-serif"}}>{kmL.toFixed(1)} <span style={{fontSize:12,fontWeight:400,color:"#777"}}>km/L</span></div>
                        </div>
                      </div>
                    );
                  })()}
                </div>
              </div>
              <div style={{display:"flex",gap:10,marginTop:28}}>
                <button onClick={()=>{setShowTripForm(false);setEditTripId(null);}} style={{flex:1,background:"#222",border:"1px solid #333",borderRadius:14,padding:14,color:"#aaa",fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>Annulla</button>
                <button onClick={saveTrip} style={{flex:2,background:"#e8f01a",border:"none",borderRadius:14,padding:14,color:"#111",fontSize:14,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>{editTripId?"Salva":"Aggiungi"}</button>
              </div>
            </div>
          </div>
        )}

        {/* ══ TAB 0 — PERCORSI ══ */}
        {tab===0 && (
          <div>
            <div style={{...card,marginBottom:12,background:"#0f1a0f",border:"1px solid #1e3a1e"}}>
              <div style={{fontSize:12,color:"#4ade80",fontWeight:700,marginBottom:6}}>📥 Importa da My Toyota (CSV)</div>
              <div style={{fontSize:12,color:"#666",lineHeight:1.7}}>Esporta il file CSV da My Toyota e usa il pulsante <b style={{color:"#aaa"}}>📥 CSV</b> in alto.<br/>Legge automaticamente: data, km percorsi e consumo.</div>
            </div>
            <div style={{background:"#13102a",border:"1px solid #2e2060",borderRadius:14,padding:"10px 16px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"center",gap:12}}>
              <div style={{fontSize:20}}>🛣️</div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:10,color:"#7a6aaa",textTransform:"uppercase",letterSpacing:0.8,marginBottom:2}}>Km totali percorsi</div>
                <div style={{fontSize:20,fontWeight:800,color:"#a78bfa",fontFamily:"'Syne',sans-serif"}}>{fmt(Math.round(totalTripKm))} <span style={{fontSize:11,fontWeight:400,color:"#6a5a9a"}}>km</span></div>
              </div>
            </div>
            {(lastPrice||yariAvg)&&(
              <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                {lastPrice&&<div style={{background:"#1a1a0a",border:"1px solid #333",borderRadius:10,padding:"7px 12px",fontSize:12,color:"#e8f01a"}}>⛽ Ultimo prezzo: <b>€ {lastPrice.toFixed(3)}/L</b></div>}
                {yariAvg&&<div style={{background:"#0f1520",border:"1px solid #1e3a5f",borderRadius:10,padding:"7px 12px",fontSize:12,color:"#60a5fa"}}>🚗 Media Yaris: <b>{yariAvg.toFixed(2)} L/100km</b></div>}
              </div>
            )}
            {sortedTrips.length===0
              ? <Empty icon="🗺️" text="Nessun percorso registrato" sub="Aggiungi manualmente o importa un CSV da My Toyota"/>
              : <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {sortedTrips.map(trip=>{
                  const tripKm=Number(trip.km)||0;
                  const l100=Number(trip.consumption)||yariAvg;
                  const yariL=l100&&tripKm?(l100/100)*tripKm:null;
                  const tripPrice = Number(trip.pricePerLiter)||lastPrice;
                  const yariCost=yariL&&tripPrice?yariL*tripPrice:null;
                  const oldL=tripKm?(OLD_L100/100)*tripKm:null;
                  const oldCost=oldL&&tripPrice?oldL*tripPrice:null;
                  const saving=yariCost&&oldCost?oldCost-yariCost:null;
                  const fc=l100?fuelColor(l100):"#555";
                  return (
                    <div key={trip.id} style={{...card,paddingLeft:22,position:"relative",overflow:"hidden"}}>
                      <div style={{position:"absolute",left:0,top:0,bottom:0,width:4,background:fc,borderRadius:"4px 0 0 4px"}}/>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:12,color:"#666",marginBottom:10}}>{fmtDate(trip.date)}</div>
                          {(yariL||oldL)&&(
                            <div>
                            {l100&&(
                              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
                                <div style={{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
                                  <div style={{fontSize:10,color:"#a78bfa",textTransform:"uppercase",letterSpacing:0.6,marginBottom:4,fontWeight:700}}>📍 Km</div>
                                  <div style={{fontSize:18,fontWeight:800,color:"#a78bfa",fontFamily:"'Syne',sans-serif"}}>{fmt(tripKm)}</div>
                                </div>
                                <div style={{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
                                  <div style={{fontSize:10,color:fc,textTransform:"uppercase",letterSpacing:0.6,marginBottom:4,fontWeight:700}}>⚡ L/100km</div>
                                  <div style={{fontSize:18,fontWeight:800,color:fc,fontFamily:"'Syne',sans-serif"}}>{Number(l100).toFixed(2)}</div>
                                </div>
                                <div style={{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
                                  <div style={{fontSize:10,color:fc,textTransform:"uppercase",letterSpacing:0.6,marginBottom:4,fontWeight:700}}>🔄 km/L</div>
                                  <div style={{fontSize:18,fontWeight:800,color:fc,fontFamily:"'Syne',sans-serif"}}>{(100/Number(l100)).toFixed(2)}</div>
                                </div>
                              </div>
                            )}
                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                              <div style={{background:"#0a1525",border:"2px solid #2a5080",borderRadius:12,padding:"12px 13px"}}>
                                <div style={{fontSize:10,color:"#60a5fa",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6,fontWeight:700}}>🚗 Yaris Cross</div>
                                {yariL&&<div style={{fontSize:13,color:"#8ab4e8",marginBottom:4,fontWeight:600}}>{yariL.toFixed(2)} L</div>}
                                {yariCost?<div style={{fontSize:18,fontWeight:800,color:"#60a5fa",fontFamily:"'Syne',sans-serif"}}>€ {yariCost.toFixed(2)}</div>:<div style={{fontSize:11,color:"#444"}}>aggiungi prezzo ⛽</div>}
                              </div>
                              <div style={{background:"#1f0e05",border:"2px solid #7a3510",borderRadius:12,padding:"12px 13px"}}>
                                <div style={{fontSize:10,color:"#f97316",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6,fontWeight:700}}>🚗 A/R Giulietta</div>
                                {oldL&&<div style={{fontSize:13,color:"#d49060",marginBottom:4,fontWeight:600}}>{oldL.toFixed(2)} L</div>}
                                {oldCost?<div style={{fontSize:18,fontWeight:800,color:"#f97316",fontFamily:"'Syne',sans-serif"}}>€ {oldCost.toFixed(2)}</div>:<div style={{fontSize:11,color:"#444"}}>aggiungi prezzo ⛽</div>}
                              </div>
                            </div>
                            </div>
                          )}
                          {saving!==null&&saving>0&&(
                            <div style={{marginTop:8,background:"#0f200f",border:"1px solid #1e4a1e",borderRadius:10,padding:"7px 12px",display:"inline-flex",alignItems:"center",gap:6}}>
                              <span style={{fontSize:13}}>💚</span>
                              <span style={{fontSize:12,color:"#4ade80"}}>Risparmiato <b>€ {saving.toFixed(2)}</b> rispetto alla A/R Giulietta</span>
                            </div>
                          )}
                        </div>
                        <div style={{display:"flex",gap:6,flexShrink:0,marginLeft:8}}>
                          <div style={{display:"flex",flexDirection:"column",gap:3}}>
                            <button onClick={()=>moveTrip(trip.id,"up")} title="Sposta su" style={{background:"#1a1a2a",border:"1px solid #2a2a4a",borderRadius:6,width:28,height:26,cursor:"pointer",fontSize:11,color:"#7a9aff",display:"flex",alignItems:"center",justifyContent:"center"}}>▲</button>
                            <button onClick={()=>moveTrip(trip.id,"down")} title="Sposta giù" style={{background:"#1a1a2a",border:"1px solid #2a2a4a",borderRadius:6,width:28,height:26,cursor:"pointer",fontSize:11,color:"#7a9aff",display:"flex",alignItems:"center",justifyContent:"center"}}>▼</button>
                          </div>
                          <button onClick={()=>{setTripForm({date:trip.date,km:trip.km,consumption:trip.consumption||""});setEditTripId(trip.id);setShowTripForm(true);}} style={{background:"#222",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14}}>✏️</button>
                          <button onClick={()=>{setTrips(p=>p.filter(e=>e.id!==trip.id));if(trip.source!=="excel")fbDelete("trips",String(trip.id));}} style={{background:"#1a0a0a",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14}}>🗑️</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            }
          </div>
        )}

        {/* ══ TAB 1 — STATISTICHE ══ */}
        {tab===1 && (
          <div style={{display:"flex",flexDirection:"column",gap:12}}>

            <div style={{display:"flex",flexDirection:"column",gap:10}}>

                {/* Totali generali */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <div style={{background:"#161616",border:"1px solid #222",borderRadius:16,padding:"14px 16px"}}>
                    <div style={{fontSize:10,color:"#666",textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>🛣️ Km totali</div>
                    <div style={{fontSize:20,fontWeight:800,color:"#a78bfa",fontFamily:"'Syne',sans-serif"}}>{fmt(Math.round(grandTotalKm))}</div>
                  </div>
                  <div style={{background:"#161616",border:"1px solid #222",borderRadius:16,padding:"14px 16px"}}>
                    <div style={{fontSize:10,color:"#666",textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>💚 Risparmio totale</div>
                    <div style={{fontSize:20,fontWeight:800,color:"#4ade80",fontFamily:"'Syne',sans-serif"}}>€ {grandSaving.toFixed(0)}</div>
                  </div>
                  <div style={{background:"#0f1520",border:"1px solid #1e3050",borderRadius:16,padding:"14px 16px"}}>
                    <div style={{fontSize:10,color:"#60a5fa",textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>🚗 Totale Yaris</div>
                    <div style={{fontSize:20,fontWeight:800,color:"#60a5fa",fontFamily:"'Syne',sans-serif"}}>€ {grandTotalYari.toFixed(0)}</div>
                  </div>
                  <div style={{background:"#1a100a",border:"1px solid #3a2010",borderRadius:16,padding:"14px 16px"}}>
                    <div style={{fontSize:10,color:"#f97316",textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>🚙 Totale A/R Giulietta</div>
                    <div style={{fontSize:20,fontWeight:800,color:"#f97316",fontFamily:"'Syne',sans-serif"}}>€ {grandTotalOld.toFixed(0)}</div>
                  </div>
                </div>

                {/* Tabella periodi */}
                <div style={{background:"#161616",border:"1px solid #222",borderRadius:18,overflow:"hidden"}}>
                  <div style={{padding:"14px 18px",borderBottom:"1px solid #222",display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:0.8}}>Periodo</span>
                    <span style={{fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:0.8,textAlign:"right"}}>Km</span>
                    <span style={{fontSize:10,color:"#60a5fa",textTransform:"uppercase",letterSpacing:0.8,textAlign:"right"}}>Yaris</span>
                    <span style={{fontSize:10,color:"#f97316",textTransform:"uppercase",letterSpacing:0.8,textAlign:"right"}}>Vecchia</span>
                  </div>
                  {mergedList.map(([key,p])=>{
                    const saving = p.oldCost - p.yariCost;
                    return (
                      <div key={key} style={{padding:"12px 18px",borderBottom:"1px solid #1a1a1a",display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:8,alignItems:"center"}}>
                        <div>
                          <div style={{fontSize:12,color:"#ccc",fontWeight:500}}>{p.label}</div>
                          {saving>0&&<div style={{fontSize:11,color:"#4ade80",marginTop:2}}>💚 -€{saving.toFixed(0)}</div>}
                        </div>
                        <span style={{fontSize:12,color:"#aaa",textAlign:"right",fontWeight:600}}>{fmt(Math.round(p.km))}</span>
                        <span style={{fontSize:13,color:"#60a5fa",textAlign:"right",fontWeight:700}}>€{p.yariCost.toFixed(0)}</span>
                        <span style={{fontSize:13,color:"#f97316",textAlign:"right",fontWeight:700}}>€{p.oldCost.toFixed(0)}</span>
                      </div>
                    );
                  })}
                  {/* Totali riga */}
                  <div style={{padding:"14px 18px",background:"#111",display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:12,color:"#fff",fontWeight:700}}>Totale</span>
                    <span style={{fontSize:12,color:"#a78bfa",textAlign:"right",fontWeight:700}}>{fmt(Math.round(grandTotalKm))}</span>
                    <span style={{fontSize:13,color:"#60a5fa",textAlign:"right",fontWeight:800}}>€{grandTotalYari.toFixed(0)}</span>
                    <span style={{fontSize:13,color:"#f97316",textAlign:"right",fontWeight:800}}>€{grandTotalOld.toFixed(0)}</span>
                  </div>
                </div>
              </div>
          </div>
        )}

        {/* ══ TAB 2 — CARBURANTE ══ */}
        {tab===2 && (
          sortedFuel.length===0
            ? <Empty icon="⛽" text="Nessun rifornimento ancora" sub="Tocca + Pieno per aggiungerne uno"/>
            : <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {sortedFuel.map(entry=>{
                const delta=getKmDelta(entry,sortedFuel);
                const l100=delta?Number(calcL100(entry.liters,delta)):null;
                const cost=entry.liters&&entry.pricePerLiter?(Number(entry.liters)*Number(entry.pricePerLiter)).toFixed(2):null;
                const fc=l100?fuelColor(l100):"#444";
                return (
                  <div key={entry.id} style={{...card,paddingLeft:22,position:"relative",overflow:"hidden"}}>
                    <div style={{position:"absolute",left:0,top:0,bottom:0,width:4,background:fc,borderRadius:"4px 0 0 4px"}}/>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div>
                        <div style={{fontSize:12,color:"#666",marginBottom:4}}>{fmtDate(entry.date)}</div>
                        <div style={{display:"flex",gap:14,flexWrap:"wrap",alignItems:"center"}}>
                          <span style={{fontSize:15,fontWeight:700,color:"#fff"}}>🔢 {fmt(entry.odometer)} km</span>
                          <span style={{fontSize:14,color:"#bbb"}}>🫙 {Number(entry.liters).toFixed(2)} L</span>
                          {cost&&<span style={{fontSize:14,color:"#e8f01a"}}>€ {cost}</span>}
                        </div>
                        {delta&&<div style={{display:"flex",gap:12,marginTop:6,flexWrap:"wrap"}}>
                          <span style={{fontSize:12,color:"#666"}}>📍 +{fmt(delta)} km</span>
                          {l100&&<span style={{fontSize:12,fontWeight:700,color:fc}}>⚡ {l100} L/100km</span>}
                        </div>}
                        {entry.notes&&<div style={{fontSize:12,color:"#555",marginTop:6,fontStyle:"italic"}}>{entry.notes}</div>}
                      </div>
                      <div style={{display:"flex",gap:6,flexShrink:0}}>
                        <button onClick={()=>{setFuelForm({date:entry.date,odometer:entry.odometer,liters:entry.liters,pricePerLiter:entry.pricePerLiter,totalAmount:entry.totalAmount||"",notes:entry.notes||""});setEditFuelId(entry.id);setShowFuelForm(true);}} style={{background:"#222",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14}}>✏️</button>
                        <button onClick={()=>deleteFuel(entry.id)} style={{background:"#1a0a0a",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14}}>🗑️</button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
        )}
      </div>
    </div>
  );
}

function StatCard({label,value,icon,accent}) {
  return (
    <div style={{background:"#161616",border:"1px solid #222",borderRadius:18,padding:"18px 20px",display:"flex",alignItems:"center",gap:14}}>
      <div style={{width:44,height:44,borderRadius:12,background:accent+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{icon}</div>
      <div>
        <div style={{fontSize:11,color:"#666",textTransform:"uppercase",letterSpacing:0.8,marginBottom:3}}>{label}</div>
        <div style={{fontSize:20,fontWeight:800,color:accent,fontFamily:"'Syne',sans-serif"}}>{value}</div>
      </div>
    </div>
  );
}
function SectionLabel({children}) {
  return <div style={{fontFamily:"'Syne',sans-serif",fontSize:11,fontWeight:700,color:"#555",letterSpacing:2,textTransform:"uppercase",marginTop:4}}>{children}</div>;
}
function Empty({icon,text,sub}) {
  return (
    <div style={{textAlign:"center",padding:"60px 20px",color:"#555"}}>
      <div style={{fontSize:44,marginBottom:14}}>{icon}</div>
      <div style={{fontSize:15,fontWeight:600,color:"#666"}}>{text}</div>
      <div style={{fontSize:12,marginTop:6}}>{sub}</div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
